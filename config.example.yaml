# VMware-to-Proxmox migration configuration
#
# Every setting here can also be passed as a CLI argument.
# CLI arguments take precedence over this file.
#
# Passwords can also be set via environment variables:
#   VCENTER_PASSWORD, PROXMOX_PASSWORD, GUEST_PASSWORD

# ---------------------------------------------------------------------------
# vCenter connection
# ---------------------------------------------------------------------------
vcenter:
  host: "vcenter.example.com"       # --vcenter-host
  user: "administrator@vsphere.local" # --vcenter-user
  password: ""                       # --vcenter-password
  port: 443                          # --vcenter-port
  insecure: true                     # --vcenter-insecure  (skip SSL verification)

# ---------------------------------------------------------------------------
# Proxmox connection
# ---------------------------------------------------------------------------
proxmox:
  host: "proxmox.example.com"       # --proxmox-host
  user: "root@pam"                   # --proxmox-user
  password: ""                       # --proxmox-password
  node: "pve"                        # --proxmox-node
  port: 8006                         # --proxmox-port
  verify_ssl: false                  # --proxmox-verify-ssl
  # SSH access to PVE
  # ssh_user: "root"                 # --proxmox-ssh-user  (default: API user without realm)
  # ssh_port: 22                     # --proxmox-ssh-port  (default: 22)
# ---------------------------------------------------------------------------
# Guest OS credentials (for running scripts inside the VM via VMware Tools)
# Optional when os_type is "other" (no guest operations needed for appliances).
# ---------------------------------------------------------------------------
guest:
  user: "Administrator"              # --guest-user  (use root for Linux)
  password: ""                       # --guest-password  (or GUEST_PASSWORD env var)

# ---------------------------------------------------------------------------
# Migration settings
# ---------------------------------------------------------------------------
migration:
  migration_datastore: ""            # --migration-datastore       (required)
  proxmox_storage: ""                # --proxmox-storage          (required)
  proxmox_final_storage: ""          # --proxmox-final-storage    (step 9: move disks here as qcow2)
  disk_move_timeout: 14400           # --disk-move-timeout        (per-disk timeout in seconds; default 4h)
  os_type: "auto"                    # --os-type  (auto, windows, ubuntu, other)
                                      #   auto   = detect from vCenter guestId
                                      #   other  = skip all OS-specific steps (appliances)
  start_vm_before_move: true         # --start-vm-before-move / --no-start-vm-before-move
  enable_nics_on_boot: false         # --enable-nics-on-boot  (NICs start enabled; halves boot wait timers)
  enable_ha: false                   # --enable-ha            (add VM to Proxmox HA after migration)

  # NIC bridges — comma-separated, mapped to NICs in order.
  # If fewer bridges than NICs, the last bridge is reused.
  # Also supports SDN bridges.
  # Example: "vmbr0,vmbr1" with 3 NICs → net0=vmbr0, net1=vmbr1, net2=vmbr1
  proxmox_bridges: "vmbr0"          # --proxmox-bridges  (shared default, overridable per VM)

  # CPU settings (shared defaults, overridable per VM)
  cpu_type: "host"                   # --cpu-type     (Proxmox CPU type, e.g. host, kvm64, x86-64-v2-AES)
  cpu_flags: ""                      # --cpu-flags    (extra CPU flags, e.g. "+aes,-vmx")
  max_cores: 0                       # --max-cores    (0 = use vCenter vCPU count as-is)
  max_sockets: 1                     # --max-sockets  (default: 1)

  # Paths inside the guest (Predeploy these before starting migration):
  staging_dir: "C:\\TMP\\pveMigration"                                          # --staging-dir
  virtio_driver_path: "C:\\TMP\\pveMigration\\vioscsi"                          # --virtio-driver-path ONLY vioscsi driver is needed here.
  virtio_tools_path: "C:\\TMP\\pveMigration\\virtio-win-guest-tools.exe"        # --virtio-tools-path
  export_nic_script: "C:\\TMP\\pveMigration\\exportNicConfig.ps1"               # --export-nic-script
  vioscsi_script: "C:\\TMP\\pveMigration\\enable-vioscsi-to-load-on-boot.ps1"   # --vioscsi-script
  purge_vmware_script: "C:\\TMP\\pveMigration\\purge-vmware-tools.ps1"        # --purge-vmware-script
  import_nic_script: "C:\\TMP\\pveMigration\\importNicConfig.ps1"             # --import-nic-script

  # VirtIO ISO settings (for step 12 — install VirtIO drivers from mounted ISO):
  virtio_iso_storage: "local"                                                  # --virtio-iso-storage
  virtio_iso_filename: "virtio-win-0.1.271-1.iso"                             # --virtio-iso-filename

  # Disk-migration backend (owns steps 6-11).
  #   proxmox-native = default; uses Proxmox API + SSH to rewrite descriptors
  #                    and move/convert disks with qemu-img.
  #   netapp-shift   = delegate to NetApp Shift via REST API (requires the
  #                    netapp_shift: block below to be configured).
  disk_conversion_backend: "proxmox-native"                                    # --disk-conversion-backend

  # NetApp Shift placement (only required when disk_conversion_backend is
  # "netapp-shift"). The destination datastore is taken from
  # proxmox_final_storage above.
  # netapp_source_site: ""           # --netapp-source-site
  # netapp_destination_site: ""      # --netapp-destination-site
  # netapp_destination_volume: ""    # --netapp-destination-volume  (NetApp volume backing the qtree)
  # netapp_destination_qtree: ""     # --netapp-destination-qtree

  # ---------------------------------------------------------------------------
  # VM list — specify one or more VMs to migrate.
  #
  # Each entry must have vm_name. Any migration field (proxmox_bridges,
  # proxmox_vmid, max_cores, max_sockets, proxmox_storage, etc.) can be
  # overridden per VM. Guest credentials (guest_user, guest_password) can
  # also be overridden per VM; unset fields fall back to the shared defaults.
  #
  # ---------------------------------------------------------------------------
  vms:
    - vm_name: ""                    # required
      proxmox_vmid:                 # 0 = next available
      proxmox_bridges: "vmbr0"
      proxmox_final_storage: ""     # override final storage for this VM
      cpu_type: "host"
      cpu_flags: ""
      max_cores: 2
      max_sockets: 1
      enable_ha: false
    # - vm_name: ""
    #   proxmox_vmid: 0
    #   proxmox_bridges: "vmbr1"     # override bridge for this VM
    #   proxmox_final_storage: ""    # override final storage for this VM
    #   cpu_type: "x86-64-v2-AES"   # override CPU type for this VM
    #   cpu_flags: "+aes"            # override CPU flags for this VM
    #   max_cores: 4                 # override CPU config for this VM
    #   max_sockets: 2
    #   enable_ha: true              # override HA for this VM
    #   guest_user: "OtherAdmin"     # override guest credentials for this VM
    #   guest_password: ""
    #   netapp_source_site: ""        # override NetApp Shift source site for this VM
    #   netapp_destination_site: ""   # override NetApp Shift destination site for this VM
    #   netapp_destination_volume: "" # override NetApp Shift destination volume for this VM
    #   netapp_destination_qtree: ""  # override NetApp Shift destination qtree for this VM

# ---------------------------------------------------------------------------
# NetApp Shift connection (only required when
# migration.disk_conversion_backend is "netapp-shift")
# ---------------------------------------------------------------------------
# netapp_shift:
#   host: "shift.example.com"        # --netapp-shift-host
#   user: "admin"                    # --netapp-shift-user
#   password: ""                     # --netapp-shift-password  (or NETAPP_SHIFT_PASSWORD env var)
#   port: 443                        # --netapp-shift-port
#   verify_ssl: false                # --netapp-shift-verify-ssl

# ---------------------------------------------------------------------------
# Workflow control
# ---------------------------------------------------------------------------
skip_to: 1                           # --skip-to    (resume from step N, 1-15)
dry_run: false                       # --dry-run    (log actions without executing)
parallel: false                      # --parallel   (migrate all VMs concurrently)
verbose: false                       # --verbose    (enable debug-level logging)
